version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    groups:
      crypto:
        patterns:
          - sha2
          - hmac
          - subtle
    ignore:
      # criterion 0.8+ requires rustc 1.86; MSRV is 1.85 — bump with MSRV raise
      - dependency-name: criterion

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 2
    groups:
      actions:
        patterns:
          - actions/*