version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    groups:
      crypto:
        patterns:
          - sha2
          - hmac
          - subtle
    ignore:
      # criterion major bumps need bench API review — bump manually
      - dependency-name: criterion
        update-types: [version-update:semver-major]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 2
    groups:
      actions:
        patterns:
          - actions/*