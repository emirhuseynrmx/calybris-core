name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Build & Test (${{ matrix.rust }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rust: [1.83.0, stable]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: ${{ runner.os }}-${{ matrix.rust }}-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build
        run: cargo build --release

      - name: Test (default features)
        run: cargo test --all-features

      - name: Test (no default features)
        run: cargo test --no-default-features

      - name: Install cargo-llvm-cov
        if: matrix.rust == 'stable'
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Test with coverage
        if: matrix.rust == 'stable'
        run: cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info

      - name: Upload coverage to Codecov
        if: matrix.rust == 'stable'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          fail_ci_if_error: false

      - name: Doc
        if: matrix.rust == 'stable'
        run: cargo doc --no-deps

      - name: Examples
        if: matrix.rust == 'stable'
        run: |
          cargo run --example quickstart
          cargo run --example llm_routing
          cargo run --example hft_pretrade_guard
          cargo run --example route_decision
          cargo run --example replay_audit
          cargo run --example finance_hft
          cargo run --example simple_kernel
          cargo run --example verify_wal