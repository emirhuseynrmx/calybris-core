name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  msrv:
    name: MSRV (1.85.0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.85.0
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: ${{ runner.os }}-1.85.0-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --locked --all-targets -- -D warnings

      - name: Build
        run: cargo build --locked --release

      - name: Test (default features)
        run: cargo test --locked --all-features

      - name: Test (no default features)
        run: cargo test --locked --no-default-features

      - name: Integration audit pipeline
        run: cargo test --locked --test audit_pipeline

  stable:
    name: Stable
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: ${{ runner.os }}-stable-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --locked --all-targets -- -D warnings

      - name: Build
        run: cargo build --locked --release

      - name: Test
        run: cargo test --locked --all-features

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Test with coverage
        run: cargo llvm-cov --locked --all-features --workspace --lcov --output-path lcov.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          fail_ci_if_error: false

      - name: Doc
        run: cargo doc --locked --no-deps

      - name: Examples
        run: |
          cargo run --locked --example quickstart
          cargo run --locked --example llm_routing
          cargo run --locked --example hft_pretrade_guard
          cargo run --locked --example route_decision
          cargo run --locked --example replay_audit
          cargo run --locked --example finance_hft
          cargo run --locked --example simple_kernel
          cargo run --locked --example verify_wal