name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

env:
  CARGO_TERM_COLOR: always

jobs:
  supply-chain:
    name: Supply chain
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: ${{ runner.os }}-security-${{ hashFiles('Cargo.lock') }}

      - uses: taiki-e/install-action@cargo-audit

      - name: Cargo audit
        run: cargo audit

      - uses: taiki-e/install-action@cargo-deny

      - name: Cargo deny
        run: cargo deny check --config deny.toml

  adversarial:
    name: Extended adversarial tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: ${{ runner.os }}-adversarial-${{ hashFiles('Cargo.lock') }}

      - name: Proptest (10k cases)
        run: cargo test --locked --all-features
        env:
          PROPTEST_CASES: 10000

      - name: Integration audit pipeline
        run: cargo test --locked --test audit_pipeline

  loom:
    name: Loom budget concurrency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: ${{ runner.os }}-loom-${{ hashFiles('Cargo.lock') }}

      - name: Loom model tests
        run: cargo test --locked --test budget_loom
        env:
          RUSTFLAGS: --cfg loom
          LOOM_MAX_PREEMPTIONS: 3

  miri:
    name: Miri (UB detection)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri

      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: ${{ runner.os }}-miri-${{ hashFiles('Cargo.lock') }}

      - name: Miri setup
        run: cargo miri setup

      - name: Miri library tests
        run: >
          cargo miri test --locked --lib --all-features --
          --skip wal::
          --skip aggressive_mixed
          --skip random_ops
          --skip arbitrary_
          --skip digests_stable
          --skip prescriptive_kernel
        env:
          MIRIFLAGS: -Zmiri-disable-isolation

      - name: Miri audit pipeline
        run: cargo miri test --locked --test audit_pipeline
        env:
          MIRIFLAGS: -Zmiri-disable-isolation
